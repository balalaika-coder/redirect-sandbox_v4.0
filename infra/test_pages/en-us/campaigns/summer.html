<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Summer Campaign — en-us</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
        .banner {
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
            color: white;
            padding: 3rem 2rem;
            text-align: center;
        }
        .banner h1 { font-size: 2.5rem; margin-bottom: 1rem; text-shadow: 2px 2px 4px rgba(0,0,0,0.2); }
        .content {
            max-width: 800px;
            margin: 3rem auto;
            padding: 0 2rem;
        }
        .url { 
            font-family: 'Monaco', 'Courier New', monospace;
            background: #e9ecef;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            display: inline-block;
            margin: 1rem 0;
        }
    </style>
</head>
<body>
    <div class="banner">
        <h1>☀️ Summer Campaign 2026</h1>
        <p style="font-size: 1.2rem;">Special offers for US customers</p>
    </div>
    
    <div class="content">
        <h2>Welcome to the Summer Campaign!</h2>
        <p style="margin: 1rem 0; line-height: 1.6;">
            This is the English (US) version of the campaign landing page.
        </p>
        
        <div style="background: #fff3cd; padding: 1.5rem; margin: 2rem 0; border-left: 4px solid #ffc107;">
            <h3>Current URL</h3>
            <div class="url" id="current-url"></div>
            <p style="margin-top: 1rem; font-size: 0.9rem;">
                Check if UTM parameters were appended by the redirect!
            </p>
        </div>
    </div>
    
    <script>
        document.getElementById('current-url').textContent = window.location.href;
    </script>
</body>
</html>
